<body>
    <div class="container">
      <h1>Registros de Galpon</h1>
      <div class="d-flex justify-content-center mb-4">  
        <div class="row">
          <div class="col-auto">
            <button class="btn btn-outline-dark" type="button" routerLink="/form-galpon">Nuevo Registro</button>
          </div>
          <div class="col">
            <input class="form-control" type="search" placeholder="Search" [(ngModel)]="filter.searchTerm" name="searchTerm">
          </div>
        </div>
        </div>
    <table class="table table-striped table-hover custom-table">
        <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Nombre</th>
              <th scope="col">Ubicacion</th>
              <th scope="col">Capacidad</th>
              <th scope="col">Id_usuario</th>
              <th scope="col">Editar</th>
              <th scope="col">Eliminar</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let galpon of filterGalpon()">
              <th scope="row">{{galpon.id_galpon}}</th>
              <td>{{galpon.nombre}}</td>
              <td>{{galpon.ubicacion}}</td>
              <td>{{galpon.capacidad}}</td>
              <td>{{galpon.id_usuario}}</td>
              <td><button type="submit" name="button "class="btn btn-primary" [routerLink]="['/form-galpon', galpon.id_galpon]">Editar</button></td>
              <td><button type="submit" name="button "class="btn btn-danger" (click)="delete(galpon)">Eliminar</button></td>
            </tr>
        </tbody>
      </table>
    </div>
    </body>s
