<body>
    <div class="container">
      <h1>Registros de Usuarios</h1>
      <div class="d-flex justify-content-center mb-4">  
        <div class="row">
          <div class="col-auto">
            <button class="btn btn-outline-dark" type="button" routerLink="/form-registro">Nuevo Registro</button>
          </div>
          <div class="col">
            <input class="form-control" type="search" placeholder="Search" [(ngModel)]="filter.searchTerm" name="searchTerm">
          </div>
        </div>
        </div>
    <table class="table table-striped table-hover custom-table">
        <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Nombre</th>
              <th scope="col">Apellido</th>
              <th scope="col">Email</th>
              <th scope="col">Contraseña</th>
              <th scope="col">Confimar Contraseña</th>
              <th scope="col">Edad</th>
              <th scope="col">Editar</th>
              <th scope="col">Eliminar</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let usuario of filterUsuarios()">
              <th scope="row">{{usuario.id_usuario}}</th>
              <td>{{usuario.nombre}}</td>
              <td>{{usuario.apellido}}</td>
              <td>{{usuario.email}}</td>
              <td>{{usuario.contrasena}}</td>
              <td>{{usuario.confirmar_contrasena}}</td>
              <td>{{usuario.edad}}</td>
              <td><button type="submit" name="button "class="btn btn-primary" [routerLink]="['/form-registro', usuario.id_usuario]">Editar</button></td>
              <td><button type="submit" name="button "class="btn btn-danger" (click)="delete(usuario)">Eliminar</button></td>
            </tr>
        </tbody>
      </table>
    </div>
    </body>
