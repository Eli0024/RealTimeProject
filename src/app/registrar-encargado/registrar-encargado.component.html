<body>
    <div class="container">
      <h1>Registros de Encargado</h1>
      <div class="d-flex justify-content-center mb-4">  
        <div class="row">
          <div class="col-auto">
            <button class="btn btn-outline-dark" type="button" routerLink="/form-encargado">Nuevo Registro</button>
          </div>
          <div class="col">
            <input class="form-control" type="search" placeholder="Search" [(ngModel)]="filter.searchTerm" name="searchTerm">
          </div>
        </div>
        </div>
    <table class="table table-striped table-hover custom-table">
        <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Nombre</th>
              <th scope="col">Apellido</th>
              <th scope="col">Telefono</th>
              <th scope="col">Email</th>
              <th scope="col">Id_Galpon</th>
              <th scope="col">Editar</th>
              <th scope="col">Eliminar</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let encargado of filterEncargados()">
              <th scope="row">{{encargado.id_encargado}}</th>
              <td>{{encargado.nombre}}</td>
              <td>{{encargado.apellido}}</td>
              <td>{{encargado.telefono}}</td>
              <td>{{encargado.email}}</td>
              <td>{{encargado.id_galpon}}</td>
              <td><button type="button" name="button "class="btn btn-primary" [routerLink]="['/form-encargado', encargado.id_encargado]">Editar</button></td>
              <td><button type="button" name="button "class="btn btn-danger" (click)="delete(encargado)">Eliminar</button></td>
            </tr>
        </tbody>
      </table>
    </div>
    </body>
