<body>
    <div class="container">
      <h1>Registros de Mediciones</h1>
      <div class="d-flex justify-content-center mb-4">  
        <div class="row">
          <div class="col-auto">
            <button class="btn btn-outline-dark" type="button" routerLink="/form-mediciones">Nuevo Registro</button>
          </div>
        </div>
        </div>
    <table class="table table-striped table-hover custom-table">
        <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Temperatura</th>
              <th scope="col">Humedad</th>
              <th scope="col">Fecha</th>
              <th scope="col">Hora</th>
              <th scope="col">Promedio_temperatura</th>
              <th scope="col">Id_Config</th>
              <th scope="col">Editar</th>
              <th scope="col">Eliminar</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let medicion of mediciones">
              <th scope="row">{{medicion.id_medicion}}</th>
              <td>{{medicion.temperatura}}</td>
              <td>{{medicion.humedad}}</td>
              <td>{{medicion.fecha}}</td>
              <td>{{medicion.hora}}</td>
              <td>{{medicion.promedio_temperatura}}</td>
              <td>{{medicion.id_config_parametro}}</td>
              <td><button type="button" name="button "class="btn btn-primary" [routerLink]="['/form-mediciones', medicion.id_medicion]">Editar</button></td>
              <td><button type="button" name="button "class="btn btn-danger" (click)="delete(medicion)">Eliminar</button></td>
            </tr>
        </tbody>
      </table>
    </div>
    </body>
